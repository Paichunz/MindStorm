<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindStorm</title>
    <meta name="description" content="Tu tablero creativo inteligente" />
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.innerHTML = '<div style="padding:32px;font-family:monospace;background:#fff;min-height:100vh"><h2 style="color:#c00">Module Error</h2><pre style="background:#f5f5f5;padding:16px;border-radius:8px;overflow:auto;font-size:13px;white-space:pre-wrap">' + msg + '\n\nFile: ' + src + '\nLine: ' + line + ':' + col + '\n\n' + (err && err.stack ? err.stack : '') + '</pre></div>';
        return true;
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<div style="padding:32px;font-family:monospace;background:#fff;min-height:100vh"><h2 style="color:#c00">Unhandled Promise</h2><pre style="background:#f5f5f5;padding:16px;border-radius:8px;overflow:auto;font-size:13px;white-space:pre-wrap">' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '</pre></div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
